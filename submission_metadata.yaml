ai_usage_summary: |
  Built with Claude Code (Anthropic's agentic CLI) as the primary implementation
  tool across all 10 development stages, each reviewed and explicitly approved
  (or redirected) by the team before moving to the next -- see the git history
  for the stage-by-stage commits. Claude Code proposed design decisions (the
  scoring weight scheme, honeypot exclusion vs. soft-penalty, the corroboration
  mechanism, the core_relevance-gate-vs-flat-sum scoring structure); the team
  reviewed, questioned, and in several cases explicitly directed changes before
  implementation (e.g. requiring hard-exclusion for honeypots, requiring a
  second pass to search for additional honeypot mechanisms before trusting the
  original 3, requiring the closed-source/no-validation flag to never penalize
  missing data alone). Several real bugs found during development were found
  and fixed collaboratively through this review process (see README.md's
  worked examples and Limitations sections) rather than shipped uncaught.
  Candidate profile data was read directly by Claude Code during development
  (data exploration, feature-extraction debugging, sanity-checking outputs) --
  this is standard AI-assisted development, not the constrained ranking step.
  The ranking step itself (rank.py) makes zero calls to any AI/LLM API and
  requires no network access at all, per the compute constraints.

methodology_summary: |
  Hybrid, fully-explainable pipeline, no LLM calls in the ranking step. Per-skill
  scores blend self-reported proficiency, duration, and Redrob's platform
  assessment scores (a trust discount that directly targets keyword-stuffing).
  Skills roll up into JD-aligned coverage buckets. A TF-IDF cosine similarity
  against a hand-written "ideal candidate" narrative catches genuine fits who
  don't use the JD's exact vocabulary. The composite score is a gate
  (narrative + retrieval/vector-DB coverage) multiplied by a bounded secondary
  modifier (experience, eval-methodology evidence, nice-to-have skills, title) --
  not a flat weighted sum, so incidental skill tags or tenure alone can't
  manufacture a competitive score without real core relevance. Seven JD-stated
  disqualifiers are checked structurally where the dataset supports it
  (job-hopping tenure math, consulting-only career, CV/speech-only skills,
  recent-LLM-only exposure including a narrative-confession check) and as soft
  continuous signals where it doesn't (pure-research-only, architecture-only).
  Three honeypot mechanisms (impossible tenure, zero-duration "expert" skills,
  years-of-experience contradictions) are hard-excluded before scoring, never
  soft-penalized. Reasoning strings are generated directly from the same
  feature values that drove the score -- no separate LLM writeup, so nothing
  can be cited that isn't actually in the candidate's profile. Full 100K run:
  ~119s wall-clock, ~320MB peak RAM, 0% honeypot rate in the final top 100.

declarations:
